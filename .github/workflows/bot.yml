name: Gold Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run bot
        run: python bot.py
        env:
          TD_KEY: ${{ secrets.TD_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        timeout-minutes: 360
