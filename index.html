function calcEMA(c,p){var k=2/(p+1);var e=[c[0]];for(var i=1;i<c.length;i++)e.push(c[i]*k+e[i-1]*(1-k));return e;}

function findSwing(highs,lows,lookback){
  lookback=lookback||20;var n=highs.length;
  var sh=highs[n-lookback],sl=lows[n-lookback];
  for(var i=n-lookback;i<n;i++){if(highs[i]>sh)sh=highs[i];if(lows[i]<sl)sl=lows[i];}
  return{high:sh,low:sl};
}

function computeSignal(price,closes,highs,lows,closes1h,closes15){
  var e20=calcEMA(closes,20);var e50=calcEMA(closes,50);
  var rsi4h=calcRSI(closes,14);
  var rsi1h=calcRSI(closes1h||closes,14);
  var stoch15=calcStoch(closes15||closes);
  var swing=findSwing(highs,lows,20);
  var isBuy=e20[e20.length-1]>e50[e50.length-1];
  var rsi=rsi1h[rsi1h.length-1];
  var rsi4hVal=rsi4h[rsi4h.length-1];
  var rsiOk=rsi>35&&rsi<65;
  var momentumOk=isBuy?rsi4hVal>50:rsi4hVal<50;
  var stochOk=isBuy?(stoch15.k>stoch15.d&&stoch15.k<80):(stoch15.k<stoch15.d&&stoch15.k>20);
  var range=swing.high-swing.low;
  var fib382=isBuy?swing.low+range*0.382:swing.high-range*0.382;
  var fib500=isBuy?swing.low+range*0.500:swing.high-range*0.500;
  var fib618=isBuy?swing.low+range*0.618:swing.high-range*0.618;
  var nearFib=Math.abs(price-fib382)<range*0.06||Math.abs(price-fib500)<range*0.06||Math.abs(price-fib618)<range*0.06;
  var conditions={trend:true,rsi:rsiOk,momentum:momentumOk,stoch:stochOk,fib:nearFib};
  var score=Object.values(conditions).filter(Boolean).length;
  var direction=score>=4?(isBuy?"buy":"sell"):"neutral";
  var label,color,bg;
  if(direction==="buy"){label="ACHAT";color=C.green;bg=C.greenSoft;}
  else if(direction==="sell"){label="VENTE";color=C.red;bg=C.redSoft;}
  else{label="ATTENTE";color=C.gold;bg=C.goldSoft;}
  return{direction:direction,label:label,color:color,bg:bg,score:score,
    conditions:conditions,isBuy:isBuy,swing:swing,
    fib:{r382:fib382,r500:fib500,r618:fib618},
    rsi:rsi,stoch:stoch15};
}
