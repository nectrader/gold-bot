function isWeekend(){var d=new Date().getUTCDay();return d===0||d===6;}
function isForexPair(sym){return sym!=="BTC/USD";}
function getActivePairs(){return isWeekend()?PAIRS.filter(function(p){return p.symbol==="BTC/USD";}):PAIRS;}

// ── MATH ──
function calcEMA(c,p){var k=2/(p+1),e=[c[0]];for(var i=1;i<c.length;i++)e.push(c[i]*k+e[i-1]*(1-k));return e;}
function calcSMA(a,p){var o=[];for(var i=p-1;i<a.length;i++)o.push(a.slice(i-p+1,i+1).reduce(function(x,y){return x+y;},0)/p);return o;}
function calcRSI(c,p){p=p||14;var g=0,l=0;for(var i=1;i<=p;i++){var d=c[i]-c[i-1];d>0?g+=d:l-=d;}var ag=g/p,al=l/p,o=[];for(var i=p+1;i<c.length;i++){var d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;o.push(al===0?100:100-100/(1+ag/al));}return o;}
function calcStoch(c){var r=calcRSI(c,14),raw=[];for(var i=13;i<r.length;i++){var sl=r.slice(i-13,i+1),mn=Math.min.apply(null,sl),mx=Math.max.apply(null,sl);raw.push(mx===mn?50:(r[i]-mn)/(mx-mn)*100);}var sk=calcSMA(raw,3),sd=calcSMA(sk,3);return{k:sk[sk.length-1]||50,d:sd[sd.length-1]||50};}
function calcATR(h,l,c,p){p=p||14;var tr=[];for(var i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));var a=tr.slice(0,p).reduce(function(x,y){return x+y;},0)/p;for(var i=p;i<tr.length;i++)a=(a*(p-1)+tr[i])/p;return a;}
function findSwing(h,l,n){n=n||20;var sh=h[h.length-n],sl=l[l.length-n];for(var i=h.length-n;i<h.length;i++){if(h[i]>sh)sh=h[i];if(l[i]<sl)sl=l[i];}return{high:sh,low:sl};}
function getPip(s){return s.indexOf("XAU")>=0?0.10:s.indexOf("BTC")>=0?1:s.indexOf("JPY")>=0?0.01:0.0001;}
function getDP(s){return s.indexOf("BTC")>=0?0:s.indexOf("XAU")>=0?2:s.indexOf("JPY")>=0?3:5;}
function distToPips(dist,sym){return Math.round(Math.abs(dist)/getPip(sym));}
function pipsToDist(pips,sym){return pips*getPip(sym);}
function fmtPrice(v,s){if(!v)return "--";var d=getDP(s);return v.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g," ");}

function computeSig(price,cls,hhs,lls){
  var e20=calcEMA(cls,20),e50=calcEMA(cls,50);
  var r=calcRSI(cls,14),st=calcStoch(cls);
  var sw=findSwing(hhs,lls,20);
  var buy=e20[e20.length-1]>e50[e50.length-1];
  var rsiVal=r[r.length-1];
  var rsiOk=rsiVal>35&&rsiVal<65;
  var stOk=buy?(st.k>st.d&&st.k<80):(st.k<st.d&&st.k>20);
  var rng=sw.high-sw.low;
  var f382=buy?sw.low+rng*0.382:sw.high-rng*0.382;
  var f618=buy?sw.low+rng*0.618:sw.high-rng*0.618;
  var nearFib=Math.abs(price-f382)<rng*0.06||Math.abs(price-f618)<rng*0.06;
  var score=[true,rsiOk,stOk,nearFib].filter(Boolean).length;
  var dir=score>=3?(buy?"buy":"sell"):"neutral";
  return{dir:dir,buy:buy,score:score,rsi:rsiVal,stoch:st,swing:sw,cond:{trend:true,rsi:rsiOk,stoch:stOk,fib:nearFib}};
}

function buildPlan(price,atrVal,sig,sym){
  if(sig.dir==="neutral")return null;
  var d=getDP(sym),buy=sig.buy;
  var sw=sig.swing,rng=sw.high-sw.low;
  var entry=parseFloat(price.toFixed(d));
  var f382=buy?sw.low+rng*0.382:sw.high-rng*0.382;
  var f618=buy?sw.low+rng*0.618:sw.high-rng*0.618;
  var slBase=buy?Math.min(f382,f618)-atrVal*0.2:Math.max(f382,f618)+atrVal*0.2;
  var sl=parseFloat(slBase.toFixed(d));
  var slP=distToPips(Math.abs(entry-sl),sym);
  var minSlP=sym.indexOf("XAU")>=0?80:sym.indexOf("BTC")>=0?500:25;
  var maxSlP=sym.indexOf("XAU")>=0?300:sym.indexOf("BTC")>=0?3000:80;
  if(slP<minSlP){slP=minSlP;sl=parseFloat((buy?entry-pipsToDist(slP,sym):entry+pipsToDist(slP,sym)).toFixed(d));}
  if(slP>maxSlP){slP=maxSlP;sl=parseFloat((buy?entry-pipsToDist(slP,sym):entry+pipsToDist(slP,sym)).toFixed(d));}
  var t1=parseFloat((buy?sw.high+rng*0.272:sw.low-rng*0.272).toFixed(d));
  var t2=parseFloat((buy?sw.high+rng*0.618:sw.low-rng*0.618).toFixed(d));
  var t3=parseFloat((buy?sw.high+rng*1.618:sw.low-rng*1.618).toFixed(d));
  var t1p=distToPips(Math.abs(t1-entry),sym);
  var t2p=distToPips(Math.abs(t2-entry),sym);
  var t3p=distToPips(Math.abs(t3-entry),sym);
  if(t1p<slP){t1p=slP;t1=parseFloat((buy?entry+pipsToDist(t1p,sym):entry-pipsToDist(t1p,sym)).toFixed(d));}
  if(t2p<slP*2){t2p=Math.round(slP*3);t2=parseFloat((buy?entry+pipsToDist(t2p,sym):entry-pipsToDist(t2p,sym)).toFixed(d));}
  if(t3p<slP*4){t3p=Math.round(slP*6);t3=parseFloat((buy?entry+pipsToDist(t3p,sym):entry-pipsToDist(t3p,sym)).toFixed(d));}
  var rr1=(t1p/slP).toFixed(1);
  var rr2=(t2p/slP).toFixed(1);
  var rr3=Math.round(t3p/slP);
  return{buy:buy,sym:sym,entry:entry.toFixed(d),sl:sl.toFixed(d),t1:t1.toFixed(d),t2:t2.toFixed(d),t3:t3.toFixed(d),slP:slP,t1p:t1p,t2p:t2p,t3p:t3p,rr1:rr1,rr2:rr2,rr3:rr3};
}

async function fetchCandles(sym,interval,size){
  var r=await fetch("https://api.twelvedata.com/time_series?symbol="+sym+"&interval="+interval+"&outputsize="+size+"&apikey="+apiKey);
  var d=await r.json();
  if(d.status==="error")throw new Error(d.message);
  return d.values.reverse().map(function(c){return{o:parseFloat(c.open),h:parseFloat(c.high),l:parseFloat(c.low),c:parseFloat(c.close)};});
}

async function refresh(){
  try{
    setError("");
    var sym=selectedPair.symbol;
    if(isWeekend()&&isForexPair(sym)){
      setError("⚠️ Marché fermé le week-end. Seul BTC/USD est disponible.");
      if(sym!=="BTC/USD"){
        var btc=PAIRS.find(function(p){return p.symbol==="BTC/USD";});
        if(btc){selectedPair=btc;localStorage.setItem("sp",JSON.stringify(btc));lastNotif="";prevPlanDir=null;currentPrice=null;currentChange=null;currentSig=null;currentPlan=null;startWS();}
      }
      showWeekendBanner();
      render();
      return;
    }
    showWeekendBanner();
    var c4h=await fetchCandles(sym,"4h",60);
    var p=c4h[c4h.length-1].c;
    currentPrice=p;
    var cls=c4h.map(function(c){return c.c;});
    var hhs=c4h.map(function(c){return c.h;});
    var lls=c4h.map(function(c){return c.l;});
    var e20=calcEMA(cls,20),e50=calcEMA(cls,50);
    var a=calcATR(hhs,lls,cls,14);
    currentChange=((p-cls[cls.length-2])/cls[cls.length-2])*100;
    chartData={candles:c4h,e20:e20,e50:e50};
    lastUpdate=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    var sg=computeSig(p,cls,hhs,lls);
    currentSig=sg;
    var pl=sg.dir!=="neutral"?buildPlan(p,a,sg,sym):null;
    if(pl&&prevPlanDir&&pl.buy!==(prevPlanDir==="buy"))notifyTelegram(pl,sg,true);
    if(pl){notifyTelegram(pl,sg,false);prevPlanDir=sg.dir;}
    currentPlan=pl;
    render();
  }catch(e){setError("Erreur: "+e.message);render();}
}

function setError(msg){document.getElementById("error-msg").style.display=msg?"block":"none";document.getElementById("error-msg").textContent=msg;}

async function scanAllPairs(){
  if(scanRunning)return;
  scanRunning=true;
  var activePairs=getActivePairs();
  for(var i=0;i<activePairs.length;i++){
    var pr=activePairs[i];
    try{
      var c=await fetchCandles(pr.symbol,"4h",40);
      var cls=c.map(function(x){return x.c;});
      var hhs=c.map(function(x){return x.h;});
      var lls=c.map(function(x){return x.l;});
      var p=cls[cls.length-1];
      var a=calcATR(hhs,lls,cls,14);
      var sg=computeSig(p,cls,hhs,lls);
      var pl=sg.dir!=="neutral"?buildPlan(p,a,sg,pr.symbol):null;
      sigList[pr.symbol]={pair:pr,price:p,sig:sg,plan:pl,time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})};
      if(currentTab==="signaux")renderSignaux();
    }catch(e){}
    await new Promise(function(r){setTimeout(r,8000);});
  }
  scanRunning=false;
}

function startWS(){
  if(wsConn){wsConn.close();wsConn=null;}
  var w=new WebSocket("wss://ws.twelvedata.com/v1/quotes/price?apikey="+apiKey);
  w.onopen=function(){w.send(JSON.stringify({action:"subscribe",params:{symbols:selectedPair.symbol}}));};
  w.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.event==="price"&&d.symbol===selectedPair.symbol&&d.price){currentPrice=parseFloat(d.price);lastUpdate=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});document.getElementById("price-display").textContent=fmtPrice(currentPrice,selectedPair.symbol);document.getElementById("last-update").textContent=lastUpdate;}}catch(x){}};
  w.onclose=function(){setTimeout(startWS,5000);};
  wsConn=w;
}

function drawChart(){
  var canvas=document.getElementById("chart-canvas");
  if(!canvas||!chartData.candles||!chartData.candles.length)return;
  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.clientWidth;
  var H=170;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";
  var ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  var rc=chartData.candles.slice(-40);
  var e20=chartData.e20?chartData.e20.slice(-40):[];
  var e50=chartData.e50?chartData.e50.slice(-40):[];
  var ps=rc.reduce(function(a,c){return a.concat([c.h,c.l]);},[]);
  var mn=Math.min.apply(null,ps),mx=Math.max.apply(null,ps),rng=mx-mn||1,pad=12;
  var py=function(v){return H-pad-((v-mn)/rng)*(H-pad*2);};
  ctx.fillStyle="#0e0e1a";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#1e1e35";ctx.lineWidth=1;
  for(var i=1;i<=4;i++){var y=pad+(H-pad*2)*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  var step=W/rc.length,cw=Math.max(2,step-1.5);
  rc.forEach(function(c,i){
    var x=i*step+step/2,bull=c.c>=c.o;
    ctx.strokeStyle=bull?"rgba(0,212,170,0.5)":"rgba(255,77,109,0.5)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,py(c.h));ctx.lineTo(x,py(c.l));ctx.stroke();
    ctx.fillStyle=bull?"rgba(0,212,170,0.85)":"rgba(255,77,109,0.85)";
    var bt=py(Math.max(c.o,c.c)),bb=py(Math.min(c.o,c.c));
    ctx.fillRect(x-cw/2,bt,cw,Math.max(1,bb-bt));
  });
  function dl(arr,col,dash){if(!arr||arr.length<2)return;ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash(dash||[]);arr.forEach(function(v,i){var x=i*step+step/2;i===0?ctx.moveTo(x,py(v)):ctx.lineTo(x,py(v));});ctx.stroke();ctx.setLineDash([]);}
  dl(e20,"#f5a623");dl(e50,"#4d9fff",[4,3]);
}

      if(btn){btn.style.border="1px solid "+(x===c?"#f5a623":"#1e1e35");btn.style.background=x===c?"rgba(245,166,35,0.1)":"#141422";btn.style.color=x===c?"#f5a623":"#6a6a8a";}
    });
    renderList();
  };
  document.body.appendChild(overlay);
  renderList();
}

// ── INIT ──
if(apiKey){
  showMainApp();
  refresh();
  startWS();
  setTimeout(scanAllPairs,3000);
  refreshTimer=setInterval(refresh,90000);
}else{
  showSetup();
}
</script>
