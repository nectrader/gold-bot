function ema(c,p){var k=2/(p+1),e=[c[0]];for(var i=1;i<c.length;i++)e.push(c[i]*k+e[i-1]*(1-k));return e;}
function sma(a,p){var o=[];for(var i=p-1;i<a.length;i++)o.push(a.slice(i-p+1,i+1).reduce(function(x,y){return x+y;},0)/p);return o;}
function rsi(c,p){p=p||14;var g=0,l=0;for(var i=1;i<=p;i++){var d=c[i]-c[i-1];d>0?g+=d:l-=d;}var ag=g/p,al=l/p,o=[];for(var i=p+1;i<c.length;i++){var d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;o.push(al===0?100:100-100/(1+ag/al));}return o;}
function stoch(c){var r=rsi(c,14),raw=[];for(var i=13;i<r.length;i++){var sl=r.slice(i-13,i+1),mn=Math.min.apply(null,sl),mx=Math.max.apply(null,sl);raw.push(mx===mn?50:(r[i]-mn)/(mx-mn)*100);}var sk=sma(raw,3),sd=sma(sk,3);return{k:sk[sk.length-1]||50,d:sd[sd.length-1]||50};}
function atr(h,l,c,p){p=p||14;var tr=[];for(var i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));var a=tr.slice(0,p).reduce(function(x,y){return x+y;},0)/p;for(var i=p;i<tr.length;i++)a=(a*(p-1)+tr[i])/p;return a;}

function swing(highs,lows,n){n=n||20;var sh=highs[highs.length-n],sl=lows[lows.length-n];for(var i=highs.length-n;i<highs.length;i++){if(highs[i]>sh)sh=highs[i];if(lows[i]<sl)sl=lows[i];}return{high:sh,low:sl};}

function pip(s){return s.indexOf("XAU")>=0?0.10:s.indexOf("BTC")>=0?1:s.indexOf("JPY")>=0?0.01:0.0001;}
function dp(s){return s.indexOf("XAU")>=0||s.indexOf("BTC")>=0?0:s.indexOf("JPY")>=0?2:5;}

function computeSig(price,closes,highs,lows){
  var e20=ema(closes,20),e50=ema(closes,50);
  var r=rsi(closes,14),st=stoch(closes);
  var sw=swing(highs,lows,20);
  var buy=e20[e20.length-1]>e50[e50.length-1];
  var rsiVal=r[r.length-1];
  var rsiOk=rsiVal>35&&rsiVal<65;
  var stochOk=buy?(st.k>st.d&&st.k<80):(st.k<st.d&&st.k>20);
  var rng=sw.high-sw.low;
  var f382=buy?sw.low+rng*0.382:sw.high-rng*0.382;
  var f618=buy?sw.low+rng*0.618:sw.high-rng*0.618;
  var nearFib=Math.abs(price-f382)<rng*0.06||Math.abs(price-f618)<rng*0.06;
  var score=[true,rsiOk,stochOk,nearFib].filter(Boolean).length;
  var dir=score>=3?(buy?"buy":"sell"):"neutral";
  return{dir:dir,buy:buy,score:score,rsi:rsiVal,stoch:st,swing:sw,
    cond:{trend:true,rsi:rsiOk,stoch:stochOk,fib:nearFib}};
}

function buildPlan(price,atrVal,sig,sym){
  if(sig.dir==="neutral")return null;
  var p=pip(sym),d=dp(sym),buy=sig.buy;
  var sw=sig.swing,rng=sw.high-sw.low;
  var entry=parseFloat(price.toFixed(d));
  var f382=buy?sw.low+rng*0.382:sw.high-rng*0.382;
  var f618=buy?sw.low+rng*0.618:sw.high-rng*0.618;
  var slBase=buy?Math.min(f382,f618)-atrVal*0.2:Math.max(f382,f618)+atrVal*0.2;
  var sl=parseFloat(slBase.toFixed(d));
  var slP=Math.round(Math.abs(entry-sl)/p);
  var minSl=sym.indexOf("XAU")>=0?80:sym.indexOf("BTC")>=0?500:25;
  var maxSl=sym.indexOf("XAU")>=0?150:sym.indexOf("BTC")>=0?2000:60;
  if(slP<minSl){slP=minSl;sl=parseFloat((buy?entry-slP*p:entry+slP*p).toFixed(d));}
  if(slP>maxSl){slP=maxSl;sl=parseFloat((buy?entry-slP*p:entry+slP*p).toFixed(d));}
  var t1=parseFloat((buy?sw.high+rng*0.272:sw.low-rng*0.272).toFixed(d));
  var t2=parseFloat((buy?sw.high+rng*0.618:sw.low-rng*0.618).toFixed(d));
  var t3=parseFloat((buy?sw.high+rng*1.618:sw.low-rng*1.618).toFixed(d));
  var t1p=Math.round(Math.abs(t1-entry)/p);
  var t2p=Math.round(Math.abs(t2-entry)/p);
  var t3p=Math.round(Math.abs(t3-entry)/p);
  if(t1p<slP){t1=parseFloat((buy?entry+slP*p:entry-slP*p).toFixed(d));t1p=slP;}
  if(t2p<slP*2){t2=parseFloat((buy?entry+slP*p*3:entry-slP*p*3).toFixed(d));t2p=slP*3;}
  if(t3p<slP*4){t3=parseFloat((buy?entry+slP*p*6:entry-slP*p*6).toFixed(d));t3p=slP*6;}
  return{buy:buy,sym:sym,entry:entry.toFixed(d),sl:sl.toFixed(d),
    t1:t1.toFixed(d),t2:t2.toFixed(d),t3:t3.toFixed(d),
    slP:slP,t1p:t1p,t2p:t2p,t3p:t3p,
    rr1:(t1p/slP).toFixed(1),rr2:(t2p/slP).toFixed(1),rr3:Math.round(t3p/slP)};
}

function Chart(props){
  var ref=useRef(null);
  useEffect(function(){
    if(!ref.current||!props.c||!props.c.length)return;
    var cv=ref.current,dpr=window.devicePixelRatio||1;
    var W=cv.parentElement.clientWidth,H=170;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
    var ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
    var rc=props.c.slice(-40),e20=props.e20?props.e20.slice(-40):[];
    var e50=props.e50?props.e50.slice(-40):[];
    var ps=rc.reduce(function(a,c){return a.concat([c.h,c.l]);},[]);
    var mn=Math.min.apply(null,ps),mx=Math.max.apply(null,ps),rng=mx-mn||1,pad=12;
    var py=function(v){return H-pad-((v-mn)/rng)*(H-pad*2);};
    ctx.fillStyle="#0e0e1a";ctx.fillRect(0,0,W,H);
    ctx.strokeStyle="#1e1e35";ctx.lineWidth=1;
    for(var i=1;i<=4;i++){var y=pad+(H-pad*2)*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    var step=W/rc.length,cw=Math.max(2,step-1.5);
    rc.forEach(function(c,i){
      var x=i*step+step/2,bull=c.c>=c.o;
      ctx.strokeStyle=bull?"rgba(0,212,170,0.5)":"rgba(255,77,109,0.5)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,py(c.h));ctx.lineTo(x,py(c.l));ctx.stroke();
      ctx.fillStyle=bull?"rgba(0,212,170,0.85)":"rgba(255,77,109,0.85)";
      var bt=py(Math.max(c.o,c.c)),bb=py(Math.min(c.o,c.c));
      ctx.fillRect(x-cw/2,bt,cw,Math.max(1,bb-bt));
    });
    function dl(arr,col,dash){if(!arr||arr.length<2)return;ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash(dash||[]);arr.forEach(function(v,i){var x=i*step+step/2;i===0?ctx.moveTo(x,py(v)):ctx.lineTo(x,py(v));});ctx.stroke();ctx.setLineDash([]);}
    dl(e20,C.gold);dl(e50,C.blue,[4,3]);
  },[props.c,props.e20,props.e50]);
  return h("canvas",{ref:ref,style:{display:"block",borderRadius:10}});
}
