function computeSignal(price,closes,e20a,e50a,rsia,stoch){
  var e20=e20a[e20a.length-1],e50=e50a[e50a.length-1],rsi=rsia[rsia.length-1];
  var s=5;
  if(price>e20)s++;else s--;
  if(price>e50)s++;else s--;
  if(e20>e50)s+=0.5;else s-=0.5;
  if(stoch.k<20)s+=2;else if(stoch.k>80)s-=2;else if(stoch.k>stoch.d)s+=0.5;else s-=0.5;
  if(rsi<35)s++;else if(rsi>65)s--;

  var label,color,bg,advice,direction;
  if(s>=7.5){label="ACHETER";color=C.green;bg=C.greenSoft;advice="Signal fort haussier confirmé";direction="buy";}
  else if(s>=6){label="PLUTÔT ACHETER";color=C.green;bg=C.greenSoft;advice="Légère pression acheteuse";direction="buy";}
  else if(s<=2.5){label="VENDRE";color=C.red;bg=C.redSoft;advice="Signal fort baissier confirmé";direction="sell";}
  else if(s<=4){label="PLUTÔT VENDRE";color=C.red;bg=C.redSoft;advice="Légère pression vendeuse";direction="sell";}
  else{label="NEUTRE";color=C.gold;bg=C.goldSoft;advice="Signaux contradictoires — attendre";direction="neutral";}
  return{score:s,label:label,color:color,bg:bg,advice:advice,direction:direction};

function getPipSize(symbol){
  if(symbol.includes("XAU"))return 0.10;
  if(symbol.includes("BTC"))return 1;
  if(symbol.includes("JPY"))return 0.01;
  return 0.0001;
}

function buildPlan(price,atr,signal,tfSignals,symbol,srLevels){
  if(!signal||signal.direction==="neutral")return null;
  var isBuy=signal.direction==="buy";
  var tfs=["15min","1h","4h","1day"];
  var agree=tfs.filter(function(t){return tfSignals[t]&&(isBuy?tfSignals[t].score>=6:tfSignals[t].score<=4);}).length;
  if(agree<3)return null;
  var pip=getPipSize(symbol);
  var atrPips=Math.round(atr/pip);
  var slPips=Math.max(80,Math.min(150,Math.round(atrPips*0.8)));
  var dp=symbol.includes("BTC")?0:symbol.includes("XAU")?0:symbol.includes("JPY")?2:5;
  var entry=symbol.includes("XAU")||symbol.includes("BTC")?Math.round(price):parseFloat(price.toFixed(dp));
  var sl=isBuy?entry-slPips*pip:entry+slPips*pip;
  var targets=[];

    relevant.forEach(function(lv){targets.push(lv.price);});
  }
  var ratios=[1,2.8,5.8];
  while(targets.length<3){
    var p=isBuy?entry+slPips*pip*ratios[targets.length]:entry-slPips*pip*ratios[targets.length];
    targets.push(parseFloat(p.toFixed(dp)));
  }
  var tp1=parseFloat(targets[0].toFixed(dp));
  var tp2=parseFloat(targets[1].toFixed(dp));
  var tp3=parseFloat(targets[2].toFixed(dp));
  var tp1Pips=Math.round(Math.abs(tp1-entry)/pip);
  var tp2Pips=Math.round(Math.abs(tp2-entry)/pip);
  var tp3Pips=Math.round(Math.abs(tp3-entry)/pip);
  var rr=Math.round(tp3Pips/slPips);
  return{isBuy:isBuy,symbol:symbol,entry:entry.toFixed(dp),sl:sl.toFixed(dp),tp1:tp1.toFixed(dp),tp2:tp2.toFixed(dp),tp3:tp3.toFixed(dp),slPts:slPips,tp1Pts:tp1Pips,tp2Pts:tp2Pips,tp3Pts:tp3Pips,rr1:(tp1Pips/slPips).toFixed(1),rr2:(tp2Pips/slPips).toFixed(1),rr3:rr,agree:agree};
